name: release

on:
  pull_request:
  push:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v6
      
      - name: Install deps
        run: sudo apt install -y llvm clang libbpf-dev linux-libc-dev

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          # 'latest', 'nightly', or a semver
          version: '~> v2'
          args: release --clean ${{ ! startsWith(github.ref, 'refs/tags/') && '--snapshot' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BPF2GO_CFLAGS: -I/usr/include/$(dpkg-architecture -qDEB_HOST_MULTIARCH)
